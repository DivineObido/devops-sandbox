services:
  nginx:
    image: nginx:alpine
    container_name: sandbox-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - sandbox-nginx
    restart: unless-stopped

  api:
    build: ./platform
    container_name: sandbox-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - //var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: >
      sh -c "bash platform/cleanup_daemon.sh &
             bash monitor/health_poller.sh &
             python3 platform/api.py"
    networks:
      - sandbox-nginx
    depends_on:
      - nginx
    restart: unless-stopped
  
networks:
  sandbox-nginx:
    name: sandbox-nginx
    driver: bridge